# --- Bluetooth & Split Configuration ---
# Enable ZMK split keyboard behavior
CONFIG_ZMK_SPLIT=y

# Read hand selection from the physical solder jumpers on the Aurora PCBs
CONFIG_ZMK_SPLIT_BLE_ROLE_BOARD_KEYMAP=y

# --- Battery & Power Reporting (Your existing configurations) ---
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# --- Connection Stability (Highly Recommended) ---
# Increases Bluetooth transmitter power to prevent dropouts between halves
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
